<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مستكشف الفيديوهات العشوائي</title>
    <style>
        body {
            margin: 0;
            background: #050505;
            color: #fff;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        .video-wrapper {
            width: 90%;
            max-width: 800px;
            aspect-ratio: 16 / 9;
            background: #111;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.2);
            border: 1px solid #333;
        }

        iframe { width: 100%; height: 100%; border: none; }

        .controls { margin-top: 25px; text-align: center; }

        .btn-random {
            background: linear-gradient(45deg, #ff0000, #ff5555);
            color: white;
            border: none;
            padding: 15px 35px;
            font-size: 1.2rem;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
            box-shadow: 0 5px 15px rgba(255, 0, 0, 0.3);
        }

        .btn-random:active { transform: scale(0.9); }

        .status { margin-top: 10px; font-size: 0.9rem; color: #888; }
    </style>
</head>
<body>

    <div class="video-wrapper" id="player">
        <div style="display: flex; height: 100%; align-items: center; justify-content: center;">
            <p>جاهز للاكتشاف؟</p>
        </div>
    </div>

    <div class="controls">
        <button class="btn-random" onclick="getRandomVideo()">فيديو عشوائي جديد 🎲</button>
        <p class="status" id="video-tag">اضغط للبدء..</p>
    </div>

    <script>
        // كلمات بحث متنوعة جداً لضمان العشوائية
        const keywords = ["animals", "space", "technology", "funny", "travel", "music", "science", "gaming", "art", "nature", "fail", "satisfying", "ai", "short film"];

        function getRandomVideo() {
            const player = document.getElementById('player');
            const status = document.getElementById('video-tag');
            
            // اختيار كلمة عشوائية
            const randomKey = keywords[Math.floor(Math.random() * keywords.length)];
            
            // استخدام رابط البحث العشوائي من يوتيوب
            // ملاحظة: هذا الرابط يقوم ببحث داخلي ويعرض أول نتيجة عشوائية
            const embedUrl = `https://www.youtube.com/embed?listType=search&list=${randomKey}&autoplay=1`;

            player.innerHTML = `<iframe src="${embedUrl}" allow="autoplay; fullscreen" allowfullscreen></iframe>`;
            status.innerText = `التصنيف الحالي: ${randomKey}`;

            // اهتزاز بسيط للمسة هاتف S9+
            if (navigator.vibrate) navigator.vibrate(40);
        }
    </script>
</body>
</html>
